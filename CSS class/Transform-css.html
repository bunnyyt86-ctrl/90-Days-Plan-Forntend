<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform css</title>
<style>
.Transform{
    border: 2px solid black;
    background-color: aquamarine;
    padding: 20px;
    transform:skew(10px)
}
</style>
</head>
<body>
    <div class="Transform">
        <p>The element is positioned relative to its normal position, so left:20px adds 20
            pixels to the element's LEFT position
        </p>
    </div>
</body>

</html>
