<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid css</title>
    <style>
        .grid-container {
            display: grid;
            /* grid-template-columns: 1fr 1fr 1fr; */
            grid-auto-rows: 100px;
            grid-auto-columns: 100px;
            grid-template-columns: 1fr 1fr 1fr;
        }
        .item{
            grid-row-start: auto;
            grid-row-end: auto;
        }
        div{
            background-color: rgb(225, 213, 213);
            border: 1px solid goldenrod;
            padding: 10px;
        }
        .grid-container{
            background-color: aqua;
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <div> item 1</div>
        <div> item 2</div>
        <div> item 3</div>
        <div> item 4</div>
        <div> item 5</div>
        <div> item 6</div>
        <div> item 7</div>
        <div> item 8</div>
        <div> item 9</div>
    </div>
</body>

</html>
